<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <style>
      .stroke { fill: none; stroke: #90472c; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .leash { fill: none; stroke: #90472c; stroke-width: 1.8; stroke-linecap: round; }
      .title { font-family: 'Playfair Display', Georgia, serif; font-size: 56; font-weight: 700; fill: #1b1c1c; }
      .tagline { font-family: 'Montserrat', Arial, sans-serif; font-size: 22; font-weight: 300; fill: #54433d; }
      .url { font-family: 'Montserrat', Arial, sans-serif; font-size: 14; font-weight: 600; fill: #87736c; letter-spacing: 0.15em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fcf9f8"/>

  <!-- Subtle decorative wave -->
  <path d="M0 315 Q200 290 400 315 Q600 340 800 315 Q1000 290 1200 315" fill="none" stroke="#dac1ba" stroke-width="1" opacity="0.25"/>

  <!-- === Brand mark (scaled up) === -->
  <g transform="translate(600, 215) scale(3.4) translate(-80, -33)">
    <!-- Camila -->
    <g class="stroke">
      <circle cx="36" cy="17" r="6"/>
      <path d="M36 23 L36 43"/>
      <path d="M36 31 Q44 29 53 28"/>
      <path d="M36 43 L31 53"/>
      <path d="M36 43 L40 53"/>
    </g>
    <!-- Leash -->
    <path class="leash" d="M53 28 Q60 25 67 23.5"/>
    <!-- Dante -->
    <g class="stroke">
      <ellipse cx="80" cy="20" rx="10" ry="7"/>
      <path d="M89 18 Q93 20 90 23"/>
      <path d="M71 18 Q67 27 72 33"/>
      <path d="M84 16 Q88 27 83 32"/>
      <path d="M91 22 C102 24 113 28 123 32"/>
      <path d="M123 32 Q129 26 127 22"/>
      <path d="M91 30 L86 43 M95 31 L91 44"/>
      <path d="M113 35 L108 47 M118 35 L114 47"/>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="500" y1="375" x2="700" y2="375" stroke="#90472c" stroke-width="2" stroke-linecap="round"/>

  <!-- Title -->
  <text x="600" y="430" class="title" text-anchor="middle">CamiDante</text>

  <!-- Tagline -->
  <text x="600" y="485" class="tagline" text-anchor="middle">Explorando la intersección entre el arte, la palabra y la reflexión pausada</text>

  <!-- URL -->
  <text x="600" y="530" class="url" text-anchor="middle">CAMIDANTE.COM</text>
</svg>
