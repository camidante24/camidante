<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630">
  <defs>
    <style>
      .title { font-family: 'Playfair Display', Georgia, serif; font-size: 56; font-weight: 700; fill: #1b1c1c; }
      .tagline { font-family: 'Montserrat', Arial, sans-serif; font-size: 20; font-weight: 300; fill: #54433d; }
      .url { font-family: 'Montserrat', Arial, sans-serif; font-size: 13; font-weight: 600; fill: #87736c; letter-spacing: 0.15em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fcf9f8"/>

  <!-- Subtle decorative wave -->
  <path d="M0 315 Q200 290 400 315 Q600 340 800 315 Q1000 290 1200 315" fill="none" stroke="#dac1ba" stroke-width="1" opacity="0.3"/>

  <!-- Logo -->
  <image x="500" y="120" width="200" height="200" xlink:href="/logocamidante.jpg" preserveAspectRatio="xMidYMid meet"/>

  <!-- Divider -->
  <line x1="500" y1="375" x2="700" y2="375" stroke="#90472c" stroke-width="2" stroke-linecap="round"/>

  <!-- Title -->
  <text x="600" y="430" class="title" text-anchor="middle">CamiDante</text>

  <!-- Tagline -->
  <text x="600" y="480" class="tagline" text-anchor="middle">Explorando la intersección entre el arte, la palabra y la reflexión pausada</text>

  <!-- URL -->
  <text x="600" y="525" class="url" text-anchor="middle">CAMIDANTE.COM</text>

  <!-- Bottom accent -->
  <line x1="550" y1="550" x2="650" y2="550" stroke="#dac1ba" stroke-width="1" opacity="0.5"/>
</svg>
